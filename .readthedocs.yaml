# Read the Docs build. The docs toolchain lives in the PEP 735 `docs` dependency
# group (pyproject), which RTD's default pip path can't install — so the build
# drives uv directly and drops the site into RTD's output directory.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - uv sync --frozen --no-dev --group docs
    - uv run --no-sync mkdocs build --strict --site-dir $READTHEDOCS_OUTPUT/html
